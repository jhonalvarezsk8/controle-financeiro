name: Verificar Recibos

on:
  schedule:
    # Roda a cada 5 minutos (nota: GitHub pode atrasar alguns minutos em horários de pico)
    - cron: '*/5 * * * *'
  workflow_dispatch: # permite trigger manual pela interface do GitHub

jobs:
  importar:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache modelos EasyOCR (~500MB)
        uses: actions/cache@v4
        with:
          path: ~/.EasyOCR
          key: easyocr-models-v1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Dependências de sistema (libgl1 para EasyOCR)
        run: sudo apt-get install -y libgl1

      - name: Dependências Python
        run: |
          pip install --upgrade pip
          pip install easyocr pillow \
            google-auth google-auth-oauthlib \
            google-api-python-client \
            requests numpy

      - name: Executar importador de recibos
        env:
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
          GMAIL_OAUTH_KEYS_JSON: ${{ secrets.GMAIL_OAUTH_KEYS_JSON }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          MY_EMAIL: ${{ secrets.MY_EMAIL }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: python scripts/gmail_recibos.py
