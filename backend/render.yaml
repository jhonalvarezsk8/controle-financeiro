services:
  - type: web
    name: financeiro-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
